basePath: /api/v1
definitions:
  github_com_JoaoGSantiago_starti-backend_internal_services.CreateCommentInput:
    properties:
      message:
        example: Otimo post, curti bastante!
        minLength: 1
        type: string
      post_id:
        example: 1
        type: integer
      user_id:
        example: 1
        type: integer
    required:
    - message
    - post_id
    - user_id
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.CreatePostInput:
    properties:
      text:
        example: Meu primeiro post no Starti!
        minLength: 1
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - text
    - user_id
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.CreateUserInput:
    properties:
      biography:
        example: Desenvolvedor Go e APIs REST
        type: string
      email:
        example: joao@joao.com
        type: string
      name:
        example: Joao Santiago
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: senha123
        minLength: 6
        type: string
      username:
        example: joaogs
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - name
    - password
    - username
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.LoginInput:
    properties:
      email:
        example: joao@joao.com
        type: string
      password:
        example: senha123
        type: string
    required:
    - email
    - password
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.UpdateCommentInput:
    properties:
      message:
        example: Comentario atualizado
        minLength: 1
        type: string
    required:
    - message
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.UpdatePostInput:
    properties:
      text:
        example: Texto atualizado do post
        minLength: 1
        type: string
    required:
    - text
    type: object
  github_com_JoaoGSantiago_starti-backend_internal_services.UpdateUserInput:
    properties:
      biography:
        example: Backend engineer focado em Go
        type: string
      name:
        example: Joao Santiago Junior
        maxLength: 100
        minLength: 2
        type: string
    type: object
  internal_handlers.CommentResponse:
    properties:
      created_at:
        example: "2026-04-04T21:22:16-03:00"
        type: string
      id:
        example: 3
        type: integer
      message:
        example: Otimo post, curti bastante!
        type: string
      post:
        $ref: '#/definitions/internal_handlers.PostSummary'
      post_id:
        example: 10
        type: integer
      updated_at:
        example: "2026-04-04T21:22:16-03:00"
        type: string
      user:
        $ref: '#/definitions/internal_handlers.UserSummary'
      user_id:
        example: 1
        type: integer
    type: object
  internal_handlers.ErrorResponse:
    properties:
      error:
        example: usuario nao encontrado
        type: string
    type: object
  internal_handlers.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  internal_handlers.MessageResponse:
    properties:
      message:
        example: post archived
        type: string
    type: object
  internal_handlers.PostResponse:
    properties:
      archived:
        example: false
        type: boolean
      created_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      id:
        example: 10
        type: integer
      text:
        example: Meu primeiro post no Starti!
        type: string
      updated_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      user:
        $ref: '#/definitions/internal_handlers.UserSummary'
      user_id:
        example: 1
        type: integer
    type: object
  internal_handlers.PostSummary:
    properties:
      archived:
        example: false
        type: boolean
      created_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      id:
        example: 10
        type: integer
      text:
        example: Meu primeiro post no Starti!
        type: string
      updated_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  internal_handlers.UserSummary:
    properties:
      biography:
        example: Desenvolvedor Go e APIs REST
        type: string
      created_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      email:
        example: joao@joao.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: Joao Santiago
        type: string
      updated_at:
        example: "2026-04-04T21:10:41-03:00"
        type: string
      username:
        example: joaogs
        type: string
    type: object
info:
  contact: {}
  description: API REST desenvolvida com Go, Gin, GORM e PostgreSQL.
  title: Starti Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Autentica por email e senha e retorna um token JWT
      parameters:
      - description: Credenciais
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Realiza login
      tags:
      - Auth
  /comments:
    post:
      consumes:
      - application/json
      description: Cria um comentario em um post
      parameters:
      - description: Dados do comentario
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.CreateCommentInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.CommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cria comentario
      tags:
      - Comments
  /comments/{id}:
    delete:
      description: Remove um comentario por ID
      parameters:
      - description: ID do comentario
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove comentario
      tags:
      - Comments
    put:
      consumes:
      - application/json
      description: Atualiza a mensagem de um comentario
      parameters:
      - description: ID do comentario
        in: path
        name: id
        required: true
        type: integer
      - description: Dados para atualizacao
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.UpdateCommentInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.CommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Atualiza comentario
      tags:
      - Comments
  /posts:
    post:
      consumes:
      - application/json
      description: Cria uma publicacao para um usuario
      parameters:
      - description: Dados do post
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.CreatePostInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cria post
      tags:
      - Posts
  /posts/{id}:
    delete:
      description: Remove um post por ID
      parameters:
      - description: ID do post
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove post
      tags:
      - Posts
    get:
      description: Retorna os dados de um post especifico
      parameters:
      - description: ID do post
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Busca post por ID
      tags:
      - Posts
    put:
      consumes:
      - application/json
      description: Atualiza o texto de um post
      parameters:
      - description: ID do post
        in: path
        name: id
        required: true
        type: integer
      - description: Dados para atualizacao
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.UpdatePostInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Atualiza post
      tags:
      - Posts
  /posts/{id}/archive:
    patch:
      description: Marca um post como arquivado
      parameters:
      - description: ID do post
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Arquiva post
      tags:
      - Posts
  /posts/{id}/comments:
    get:
      description: Retorna comentarios associados a um post
      parameters:
      - description: ID do post
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.CommentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lista comentarios de um post
      tags:
      - Posts
  /users:
    get:
      description: Retorna todos os usuarios cadastrados
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.UserSummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lista usuarios
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Cria um novo usuario (rota publica)
      parameters:
      - description: Dados do usuario
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.UserSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Cria usuario
      tags:
      - Users
  /users/{id}:
    delete:
      description: Remove um usuario por ID
      parameters:
      - description: ID do usuario
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove usuario
      tags:
      - Users
    get:
      description: Retorna os dados de um usuario especifico
      parameters:
      - description: ID do usuario
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.UserSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Busca usuario por ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Atualiza nome e/ou biografia de um usuario
      parameters:
      - description: ID do usuario
        in: path
        name: id
        required: true
        type: integer
      - description: Dados para atualizacao
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_JoaoGSantiago_starti-backend_internal_services.UpdateUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.UserSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Atualiza usuario
      tags:
      - Users
  /users/{id}/comments:
    get:
      description: Retorna comentarios do usuario em posts nao arquivados
      parameters:
      - description: ID do usuario
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.CommentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lista comentarios publicos do usuario
      tags:
      - Users
  /users/{id}/posts:
    get:
      description: Retorna posts nao arquivados do usuario
      parameters:
      - description: ID do usuario
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.PostResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lista posts publicos do usuario
      tags:
      - Users
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Use o formato: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
